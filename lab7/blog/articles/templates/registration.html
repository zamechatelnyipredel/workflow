{% load static %}

<!DOCTYPE html>

<html lang="ru-RU">
<head>
    <meta charset="UTF-8">
    <title>Django Public Blog — регистрация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="registration">

<div class="content">
    <div class="registration_header">
        <h1>Регистрация</h1>
        <a class="back-link" href="{% url 'archive' %}">
            Все статьи
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}

        <label>
            <input type="text"
                   name="username"
                   placeholder="Имя пользователя"
                   value="{{ form.username }}">
        </label>

        <label>
            <input type="password"
                   name="password1"
                   placeholder="Пароль">
        </label>

        <label>
            <input type="password"
                   name="password2"
                   placeholder="Повторите пароль">
        </label>
        <div class="registration_button">
            <input type="submit" value="Зарегистрироваться">
        </div>
    </form>

    {% if form.errors %}
        <div class="form-errors">
            {{ form.errors }}
        </div>
    {% endif %}
</div>

</body>
</html>
