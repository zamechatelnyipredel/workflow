{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Статья "{{ post.title }}"</title>
</head>
<link rel="stylesheet" href="{% static 'css/article.css' %}">
<body class="acticle">
<div class="article-header">
    <img src="{% static 'img/dpb-logo.png' %}" alt="Лого"/>
    <div class="header_link">
        <a class="back-link" href="{% url 'archive' %}">
            Все статьи
        </a>
        <a class="header-auth back-link" href="{% url 'registration' %}">
            Регистрация
        </a>
        <a class="header-auth back-link" href="{% url 'login' %}">
            Вход
    </a>
    </div>
</div>
<div class="archive">
    <div class="one-post">
        <h2 class="post-title">
            <a href="{% url 'get_article' post.id %}">
                {{ post.title }}
            </a>
        </h2>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
    </div>
</div>
</body>
</html>
